name: build-electron

on:
  push:
    branches: ["v8.2.x"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest] #

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build with-electron
        working-directory: ./demos/with-electron
        run: |
          yarn install --no-frozen-lockfile
          yarn run build
